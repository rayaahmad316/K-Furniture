<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Katalog Produk - ADM Furniture</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --sidebar-header: #cbdce6;
            /* Biru muda sesuai gambar */
            --sidebar-bg: #2c3e50;
            --topbar-bg: #f8f9fa;
            --accent-blue: #3498db;
            --btn-tambah: #548ca8;
            /* Warna tombol Tambah sesuai gambar */
            --btn-batal: #cbdce6;
            /* Warna tombol Batal sesuai gambar */
            --input-border: #999;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            display: flex;
            background-color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 250px;
            background-color: var(--sidebar-bg);
            height: 100vh;
            position: fixed;
            z-index: 1001;
            transition: 0.3s ease;
        }

        .sidebar-logo {
            background-color: var(--sidebar-header);
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            color: #000;
        }

        .sidebar-logo h2 {
            font-size: 20px;
            font-weight: 800;
        }

        .sidebar-logo span {
            font-weight: 300;
            margin-left: 5px;
        }

        .admin-profile {
            padding: 25px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            font-size: 14px;
        }

        .menu-label {
            padding: 10px 20px;
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 5px;
        }

        .nav-link {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            color: #bdc3c7;
            text-decoration: none;
            transition: 0.3s;
        }

        .logout-section {
            position: absolute;
            bottom: 20px;
            width: 100%;
        }

        .nav-link:hover,
        .nav-link.active {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        /* --- TOPBAR --- */
        .topbar {
            position: fixed;
            top: 0;
            left: 250px;
            right: 0;
            height: 60px;
            background: var(--topbar-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid #ddd;
            z-index: 1000;
        }

        .v-divider {
            width: 1px;
            height: 35px;
            background: #ccc;
            margin-right: 20px;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            height: 100%;
        }

        .cart-box {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .badge-notif {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--accent-blue);
            color: white;
            font-size: 10px;
            padding: 1px 4px;
            border-radius: 2px;
        }

        /* --- MAIN CONTENT --- */
        .main-content {
            margin-left: 250px;
            margin-top: 60px;
            padding: 40px;
            width: 100%;
            transition: 0.3s;
        }

        .page-header h1 {
            font-size: 32px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .page-header p {
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* --- FORM CARD --- */
        .form-card {
            background: #f1f1f1;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            border: 1px solid #ddd;
        }

        .form-title {
            background: #e9ecef;
            padding: 12px 20px;
            font-weight: 600;
            font-size: 14px;
            border-bottom: 1px solid #ddd;
        }

        .form-body {
            padding: 40px 50px;
            background: #f9f9f9;
        }

        .form-group {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
        }

        .form-group label {
            width: 220px;
            font-size: 18px;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid var(--input-border);
            border-radius: 8px;
            font-size: 14px;
            background: #fff;
            outline: none;
        }

        .form-group textarea {
            height: 100px;
            resize: none;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--accent-blue);
        }

        /* --- FILE UPLOAD CUSTOM --- */
        .file-upload-wrapper {
            flex: 1;
            border: 1px solid var(--input-border);
            border-radius: 8px;
            background: #fff;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .file-upload-wrapper input[type="file"] {
            border: none;
            padding: 0;
            width: auto;
            flex: 0;
        }

        .upload-placeholder {
            color: #999;
            font-size: 14px;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 40px;
            padding-left: 220px;
        }

        .btn {
            padding: 10px 35px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            transition: 0.3s;
            color: white;
        }

        .btn-tambah {
            background: var(--btn-tambah);
        }

        .btn-batal {
            background: var(--btn-batal);
            color: #000;
        }

        .btn:hover {
            opacity: 0.8;
            transform: translateY(-2px);
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 900px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .sidebar.active {
                transform: translateX(0);
            }

            .topbar {
                left: 0;
            }

            .main-content {
                margin-left: 0;
                padding: 20px;
            }

            .form-group {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .form-group label {
                width: 100%;
            }

            .button-group {
                padding-left: 0;
                justify-content: center;
            }
        }

        /* Animation */
        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            transition: 0.6s ease-out;
        }

        .fade-in.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>

<body>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <h2>ADM<span>Furniture</span></h2>
        </div>
        <div class="admin-profile"><i class="fas fa-user-circle fa-2x"></i><span>Admin 1</span></div>
        <div class="menu-label">MENU ADMIN</div>
        <nav>
            <a href="Admin.html" class="nav-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="konsumen.html" class="nav-link"><i class="fas fa-users"></i> Konsumen</a>
            <a href="katalog-produk.html" class="nav-link active"><i class="fas fa-book"></i> Katalog Produk</a>
            <a href="order-custom.html" class="nav-link"><i class="fas fa-edit"></i> Order Custom</a>
            <div class="logout-section">
                <a href="index.html" class="nav-link"><i class="fas fa-sign-out-alt"></i> Keluar</a>
            </div>
        </nav>
    </aside>

    <nav class="topbar">
        <div class="topbar-left"><i class="fas fa-bars" id="hamburger" style="cursor:pointer; font-size: 20px;"></i>
        </div>
        <div class="topbar-right">
            <div class="v-divider"></div>
            <div class="cart-box">
                <div style="position:relative;">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="badge-notif">0</span>
                </div>
                <span style="font-size: 14px; margin-left: 10px;">Pesanan Masuk</span>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <header class="page-header fade-in" id="header">
            <h1>TAMBAH KATALOG PRODUK</h1>
            <p>Control Panel</p>
        </header>

        <section class="form-card fade-in" id="formSection">
            <div class="form-title">Tambah Katalog Produk</div>
            <div class="form-body">
                <form id="productForm">
                    <div class="form-group">
                        <label>Nama Produk</label>
                        <input type="text" id="namaProduk" placeholder="Nama Produk Furniture">
                    </div>
                    <div class="form-group">
                        <label>Deskripsi</label>
                        <textarea id="deskripsi" placeholder="Deskripsi Furniture"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Jenis Produk</label>
                        <input type="text" id="jenisProduk" placeholder="Jenis Produk Furniture">
                    </div>
                    <div class="form-group">
                        <label>Bahan</label>
                        <input type="text" id="bahan" placeholder="Bahan Furniture">
                    </div>
                    <div class="form-group">
                        <label>Warna</label>
                        <input type="text" id="warna" placeholder="Warna Furniture">
                    </div>
                    <div class="form-group">
                        <label>Ukuran</label>
                        <input type="text" id="ukuran" placeholder="Ukuran Furniture">
                    </div>
                    <div class="form-group">
                        <label>Gambar</label>
                        <div class="file-upload-wrapper">
                            <input type="file" id="gambar" accept="image/*">
                            <span class="upload-placeholder" id="fileText">Unggah Foto Furniture</span>
                        </div>
                    </div>

                    <div class="button-group">
                        <button type="submit" class="btn btn-tambah">Tambah</button>
                        <button type="button" class="btn btn-batal" onclick="window.history.back()">Batal</button>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <script>
        const hamburger = document.getElementById('hamburger');
        const sidebar = document.getElementById('sidebar');
        const fileInput = document.getElementById('gambar');
        const fileText = document.getElementById('fileText');

        hamburger.addEventListener('click', () => sidebar.classList.toggle('active'));

        function getKatalogData() {
            const saved = JSON.parse(localStorage.getItem('katalogData'));
            return Array.isArray(saved) ? saved : [];
        }

        function saveKatalogData(data) {
            localStorage.setItem('katalogData', JSON.stringify(data));
        }

        function readImageFile(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = () => reject(new Error('Gagal membaca file gambar'));
                reader.readAsDataURL(file);
            });
        }

        fileInput.addEventListener('change', () => {
            const file = fileInput.files[0];
            fileText.textContent = file ? file.name : 'Unggah Foto Furniture';
        });

        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const nama = document.getElementById('namaProduk').value.trim();
            if (!nama) {
                alert('Nama produk harus diisi.');
                return;
            }

            const deskripsi = document.getElementById('deskripsi').value.trim();
            const jenis = document.getElementById('jenisProduk').value.trim();
            const bahan = document.getElementById('bahan').value.trim();
            const warna = document.getElementById('warna').value.trim();
            const ukuran = document.getElementById('ukuran').value.trim();

            let gambar = 'https://images.unsplash.com/photo-1592078615290-033ee584e267?w=100';
            if (fileInput.files[0]) {
                gambar = await readImageFile(fileInput.files[0]);
            }

            const data = getKatalogData();
            data.push({ nama, deskripsi, jenis, bahan, warna, ukuran, gambar });
            saveKatalogData(data);

            alert('Produk baru berhasil ditambahkan.');
            window.location.href = 'katalog-produk.html';
        });

        window.addEventListener('click', (event) => {
            if (window.innerWidth <= 900 && !sidebar.contains(event.target) && event.target.id !== 'hamburger') {
                sidebar.classList.remove('active');
            }
        });

        window.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.fade-in').forEach((el) => el.classList.add('show'));
        });
    </script>
</body>

</html>
